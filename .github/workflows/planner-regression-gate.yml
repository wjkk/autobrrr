name: Planner Regression Gate

on:
  pull_request:
  push:
    branches:
      - main
      - master
  merge_group:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: planner-regression-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  planner-api-smoke:
    name: Planner API Smoke
    runs-on: ubuntu-latest
    timeout-minutes: 20
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: password
          MYSQL_DATABASE: aiv
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1 -ppassword --silent"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=20
    env:
      DATABASE_URL: mysql://root:password@127.0.0.1:3306/aiv
      API_PORT: 8787
      AIV_API_BASE_URL: http://127.0.0.1:8787
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.25.0

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm --filter @aiv/api prisma:generate

      - name: Push database schema
        run: pnpm --filter @aiv/api prisma:push

      - name: Run planner API smoke
        run: pnpm test:planner:api-smoke

      - name: Upload API smoke log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: planner-api-smoke-log
          path: /tmp/aiv-api-planner-smoke.log
          if-no-files-found: ignore

  planner-browser-smoke:
    name: Planner Browser Smoke
    runs-on: ubuntu-latest
    timeout-minutes: 30
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: password
          MYSQL_DATABASE: aiv
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1 -ppassword --silent"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=20
    env:
      DATABASE_URL: mysql://root:password@127.0.0.1:3306/aiv
      API_PORT: 8787
      AIV_API_BASE_URL: http://127.0.0.1:8787
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.25.0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm --filter @aiv/api prisma:generate

      - name: Push database schema
        run: pnpm --filter @aiv/api prisma:push

      - name: Install Python Playwright
        run: |
          python -m pip install --upgrade pip
          python -m pip install playwright
          python -m playwright install --with-deps chromium

      - name: Run planner browser smoke
        run: pnpm test:planner:browser-smoke

      - name: Upload browser smoke artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: planner-browser-smoke-artifacts
          path: /tmp/aiv-browser-regression
          if-no-files-found: ignore

  planner-regression-gate:
    name: Planner Regression Gate
    runs-on: ubuntu-latest
    needs:
      - planner-api-smoke
      - planner-browser-smoke
    if: always()
    steps:
      - name: Enforce regression gate
        run: |
          test "${{ needs.planner-api-smoke.result }}" = "success"
          test "${{ needs.planner-browser-smoke.result }}" = "success"
